{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Магазин{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Ваш CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'product_list' %}">
            🛒 Магазин
        </a>

        <div>
            <a href="{% url 'product_list' %}" class="btn btn-outline-light me-2">
                Каталог
            </a>

            {% if user.is_authenticated %}
                <a href="{% url 'cart' %}" class="btn btn-warning me-2">
                    Корзина
                </a>

                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light">
                        Выйти
                    </button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light">
                    Войти
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- ✅ Контент -->
<main class="container mt-4 flex-grow-1">
    {% block content %}
    {% endblock %}
</main>

<!-- ✅ Footer -->
<footer class="bg-dark text-white text-center py-3 mt-auto">
    <div class="container">
        © 2026 Магазин. Все права защищены.
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Ваш JS -->
<script src="{% static 'js/main.js' %}"></script>

{% block scripts %}{% endblock %}

</body>
</html>
