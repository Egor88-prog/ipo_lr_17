{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-4">

        <h2 class="mb-4">Регистрация</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

                Зарегистрироваться
            </button>
        </form>

    </div>
</div>

{% endblock %}
